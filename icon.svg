<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#272727"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="bodyClip">
      <rect x="162" y="68" width="188" height="376" rx="58"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- remote body -->
  <rect x="162" y="68" width="188" height="376" rx="58" fill="url(#body)" stroke="#303030" stroke-width="1.5"/>

  <!-- top shine -->
  <rect x="162" y="68" width="188" height="160" fill="url(#shine)" clip-path="url(#bodyClip)"/>

  <!-- touch pad ring -->
  <circle cx="256" cy="226" r="72" fill="#202020" stroke="#2e2e2e" stroke-width="1"/>

  <!-- play triangle — nudged right to feel optically centered -->
  <polygon points="245,205 245,247 284,226" fill="#ffffff" fill-opacity="0.92"/>

  <!-- back pill -->
  <rect x="197" y="342" width="118" height="40" rx="20" fill="#202020" stroke="#2e2e2e" stroke-width="1"/>

  <!-- back chevron -->
  <path d="M268 354 L253 362 L268 370" fill="none" stroke="#ffffff" stroke-opacity="0.65" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
